


on:
  workflow_dispatch:
    

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate image tag
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"

          if [ "$BRANCH" = "main" ]; then
            PREFIX="prod"
          else
            PREFIX="pre-prod"
          fi

          TAG="${PREFIX}-${{ github.sha }}"
          echo "IMAGE_TAG=$TAG" 
          echo " docker build -t myapp:${TAG}"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to environment
        run: |
          # echo "Deploying image with tag ${{ needs.build.outputs.IMAGE_TAG }}"
          echo " docker build -t myapp:${TAG}"
